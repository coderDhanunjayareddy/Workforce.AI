<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 669 406" role="img" aria-labelledby="title desc">
  <title id="title">Workforce AI logo for light backgrounds</title>
  <desc id="desc">Official Workforce AI logo optimized for light surfaces.</desc>
  <defs>
    <linearGradient id="navy-stroke" x1="188" y1="70" x2="394" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F1B3D"/>
    </linearGradient>
    <linearGradient id="teal-stroke" x1="270" y1="70" x2="359" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="dot-gradient" x1="383" y1="69" x2="418" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <g id="mark" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M209 86 L270 203 L315 126" stroke="url(#navy-stroke)" stroke-width="33"/>
    <path d="M281 86 L342 203 L390 126" stroke="url(#teal-stroke)" stroke-width="33"/>
