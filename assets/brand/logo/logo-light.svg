    <circle cx="401" cy="86" r="18" fill="url(#dot-gradient)" stroke="none"/>
  </g>
  <g id="wordmark" font-family="Manrope, Sora, Arial, sans-serif" font-weight="800">
    <text x="62" y="308" font-size="80" letter-spacing="0" fill="#0F1B3D">Workforce</text>
    <text x="499" y="308" font-size="80" letter-spacing="0" fill="#14B8A6">AI</text>
  </g>
  <text x="86" y="351" font-family="Manrope, Arial, sans-serif" font-size="29" font-weight="500" letter-spacing="0" fill="#64748B">Intelligent Workforce. Real Results.</text>
